# Stage 3: Full Configuration
# Complete multi-agent system with learning

stage: stage3

trading:
  pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - DOT/USDT
    - AVAX/USDT
    - LINK/USDT
    - ADA/USDT
    - XRP/USDT
  quote_currency: USDT
  initial_capital: 1000.0
  target_capital: 5000.0
  check_interval_minutes: 5   # Faster cycles — scan 12x per hour
  max_active_positions: 5     # More concurrent positions across wider pair set

risk:
  max_position_pct: 0.20       # Larger positions for conviction trades
  max_total_exposure_pct: 0.90
  stop_loss_pct: 0.025         # Slightly wider to avoid noise stops
  take_profit_multiplier: 2.5
  min_confidence: 0.45         # Lower gate — let more signals through
  max_daily_trades: 40
  max_daily_loss_pct: 0.10

# Exit management — let winners run, cut losers fast
exit_management:
  enable_trailing_stop: true
  enable_breakeven_stop: true
  trailing_stop:
    activation_pct: 0.025      # Activate at +2.5% gain — let winners breathe
    distance_pct: 0.015        # Trail 1.5% below peak — wider trail for momentum
  breakeven:
    activation_pct: 0.015      # Move to breakeven at +1.5%
    buffer_pct: 0.003          # 0.3% above entry covers fees
  take_profit_targets:
    - pct: 0.03                # Sell 30% at +3% gain
      sell_pct: 0.30
    - pct: 0.05                # Sell 30% at +5% gain
      sell_pct: 0.30
    - pct: 0.08                # Sell 40% at +8% gain — hold for big moves
      sell_pct: 0.40
  max_hold_hours: 48           # Hold longer for trend trades
  max_position_loss_pct: 0.08  # Hard ceiling: exit at -8% per position

# Portfolio-level profit protection
portfolio_protection:
  enable_hwm: true
  hwm_drawdown_pct: 0.03          # 3% drawdown from peak tightens all stops
  hwm_critical_drawdown_pct: 0.06  # 6% drawdown forces sale of worst position
  hwm_tighten_trail_pct: 0.005    # Tighten all trails to 0.5% when triggered

features:
  # Analysts - ALL enabled
  enable_technical_analyst: true
  enable_sentiment_analyst: true
  enable_onchain_analyst: true     # NEW: Whale/exchange flows
  enable_macro_analyst: true       # NEW: Fed/DXY/correlations
  enable_orderbook_analyst: true   # NEW: Microstructure analysis
  
  # Intelligence
  enable_intel_fusion: true
  enable_regime_detection: true    # NEW: Trend/range/volatile
  
  # Execution
  enable_limit_orders: true
  enable_smart_routing: true       # NEW: TWAP, order splitting
  
  # Risk
  enable_circuit_breakers: true
  enable_anomaly_detection: true   # NEW: Unusual pattern detection
  
  # Memory
  enable_postgres: true
  enable_learning: true            # NEW: Adapt weights from outcomes
  
  # Other
  enable_event_bus: true
  simulation_mode: true  # Keep simulation until manually switched to live

# Database Configuration
database:
  url: ${DATABASE_URL:-postgresql://trader:trader@localhost:5432/trader}
  pool_min: 2
  pool_max: 10
  command_timeout: 60

# Redis Configuration
redis:
  url: ${REDIS_URL:-redis://localhost:6379}
  cache_ttl_seconds: 300
  market_data_ttl: 60
  sentiment_ttl: 900

# Sentiment Analysis Configuration
sentiment:
  fear_greed_weight: 0.5
  news_weight: 0.4
  social_weight: 0.1
  cache_ttl_minutes: 15
  news_lookback_hours: 24
  news_headline_limit: 10

# Intelligence Fusion Weights (5 analysts)
fusion:
  analyst_weights:
    technical: 0.40
    sentiment: 0.20
    onchain: 0.18
    macro: 0.12
    orderbook: 0.10

# Circuit Breaker Thresholds
circuit_breakers:
  max_daily_loss_pct: 0.08
  max_daily_trades: 20
  volatility_threshold_pct: 0.10
  consecutive_loss_limit: 3

# Limit Order Configuration
limit_orders:
  enabled: true
  timeout_seconds: 60
  spread_buffer_pct: 0.001
  fallback_to_market: true

# Aggressive risk overrides (active when RISK_PROFILE=aggressive)
aggressive_risk:
  max_position_pct: 0.30
  max_total_exposure_pct: 0.95
  stop_loss_pct: 0.02
  take_profit_multiplier: 3.0
  min_confidence: 0.40
  max_daily_trades: 50
  max_daily_loss_pct: 0.15

# Cost optimization
cost_optimization:
  enable_batch_analysis: true
  enable_hybrid_mode: false
  enable_decision_cache: false
  hybrid:
    direction_threshold: 0.30
    confidence_threshold: 0.50
    disagreement_threshold: 0.40

# Seed Improver — recursive self-improvement (aggressive tuning)
seed_improver:
  auto_apply: true
  min_confidence: 0.55         # Lower bar — accept more experiments
  max_risk: medium
  max_patches_per_run: 5       # More changes per cycle
  cooldown_hours: 1            # Faster iteration
  gcs_config_bucket: "cryptotrading-485110-config"
  dgm:
    enabled: true
    evaluation_window_hours: 24
    max_evaluation_hours: 72
    min_trades_for_eval: 3
    archive_max_size: 50
    selection_temperature: 1.0
    diversity_weight: 0.1
    rollback_tolerance: 0.05
    # Fitness = raw PnL after fees. No weighted composite — just profit.

# Loss velocity detection
loss_velocity:
  threshold_pct: 0.05      # 5% drop in window triggers exit
  window_minutes: 30       # Rolling window for velocity check

log_level: INFO
