# Stage 3: Full Configuration
# Complete multi-agent system with learning

stage: stage3

trading:
  pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - AVAX/USDT
    - DOT/USDT
  quote_currency: USDT
  initial_capital: 1000.0
  target_capital: 5000.0
  check_interval_minutes: 10  # Active day trading (6x per hour)
  max_active_positions: 3     # Rotate capital into top 3 pairs

risk:
  max_position_pct: 0.15       # More conservative with more pairs
  max_total_exposure_pct: 0.80
  stop_loss_pct: 0.02
  take_profit_multiplier: 2.0
  min_confidence: 0.50
  max_daily_trades: 20
  max_daily_loss_pct: 0.08

# Exit management
exit_management:
  enable_trailing_stop: true
  enable_breakeven_stop: true
  trailing_stop:
    activation_pct: 0.03
    distance_pct: 0.015
  breakeven:
    activation_pct: 0.015
    buffer_pct: 0.004
  take_profit_targets:
    - pct: 0.02
      sell_pct: 0.50
    - pct: 0.04
      sell_pct: 0.50
  max_hold_hours: 48

features:
  # Analysts - ALL enabled
  enable_technical_analyst: true
  enable_sentiment_analyst: true
  enable_onchain_analyst: true     # NEW: Whale/exchange flows
  enable_macro_analyst: true       # NEW: Fed/DXY/correlations
  enable_orderbook_analyst: true   # NEW: Microstructure analysis
  
  # Intelligence
  enable_intel_fusion: true
  enable_regime_detection: true    # NEW: Trend/range/volatile
  
  # Execution
  enable_limit_orders: true
  enable_smart_routing: true       # NEW: TWAP, order splitting
  
  # Risk
  enable_circuit_breakers: true
  enable_anomaly_detection: true   # NEW: Unusual pattern detection
  
  # Memory
  enable_postgres: true
  enable_learning: true            # NEW: Adapt weights from outcomes
  
  # Other
  enable_event_bus: true
  simulation_mode: true  # Keep simulation until manually switched to live

# Database Configuration
database:
  url: ${DATABASE_URL:-postgresql://trader:trader@localhost:5432/trader}
  pool_min: 2
  pool_max: 10
  command_timeout: 60

# Redis Configuration
redis:
  url: ${REDIS_URL:-redis://localhost:6379}
  cache_ttl_seconds: 300
  market_data_ttl: 60
  sentiment_ttl: 900

# Sentiment Analysis Configuration
sentiment:
  fear_greed_weight: 0.5
  news_weight: 0.4
  social_weight: 0.1
  cache_ttl_minutes: 15
  news_lookback_hours: 24
  news_headline_limit: 10

# Intelligence Fusion Weights (5 analysts)
fusion:
  analyst_weights:
    technical: 0.30
    sentiment: 0.25
    onchain: 0.20
    macro: 0.15
    orderbook: 0.10

# Circuit Breaker Thresholds
circuit_breakers:
  max_daily_loss_pct: 0.08
  max_daily_trades: 20
  volatility_threshold_pct: 0.10
  consecutive_loss_limit: 3

# Limit Order Configuration
limit_orders:
  enabled: true
  timeout_seconds: 60
  spread_buffer_pct: 0.001
  fallback_to_market: true

# Aggressive risk overrides (active when RISK_PROFILE=aggressive)
aggressive_risk:
  max_position_pct: 0.25
  max_total_exposure_pct: 0.90
  stop_loss_pct: 0.015
  take_profit_multiplier: 2.0
  min_confidence: 0.40
  max_daily_trades: 30
  max_daily_loss_pct: 0.12

# Cost optimization
cost_optimization:
  enable_batch_analysis: true
  enable_hybrid_mode: false
  enable_decision_cache: false
  hybrid:
    direction_threshold: 0.30
    confidence_threshold: 0.50
    disagreement_threshold: 0.40

# Seed Improver — recursive self-improvement
seed_improver:
  auto_apply: true
  min_confidence: 0.70
  max_risk: medium
  max_patches_per_run: 3
  cooldown_hours: 2
  gcs_config_bucket: "cryptotrading-485110-config"

log_level: INFO
